name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x V2rayNG/gradlew

      - name: Download libv2ray
        run: |
          cd V2rayNG
          mkdir -p app/libs
          LATEST=$(curl -s https://api.github.com/repos/2dust/v2rayNG/releases/latest | grep "browser_download_url" | grep "\.aar" | cut -d '"' -f 4)
          echo "Downloading: $LATEST"
          curl -L "$LATEST" -o app/libs/libv2ray.aar
          
      - name: Build Release APK
        working-directory: V2rayNG
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: v2rayNG-patched
          path: V2rayNG/app/build/outputs/apk/release/*.apk
          retention-days: 7
